<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Questions - TaxStorks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .questions-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .question-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .question-card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            color: #999;
        }

        .answer-count {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        .ask-question-btn {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #667eea;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.8em;
            color: #999;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s;
        }

        .btn-submit:hover {
            transform: scale(1.02);
        }

        .filter-section {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: white;
            color: #667eea;
            padding: 10px 20px;
            border: 2px solid #667eea;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Tax Questions</h1>
            <p>Get anonymous tax advice from the community</p>
        </header>

        <div class="filter-section">
            <button class="filter-btn active" onclick="filterQuestions('all')">All Questions</button>
            <button class="filter-btn" onclick="filterQuestions('unanswered')">Unanswered</button>
            <button class="filter-btn" onclick="filterQuestions('answered')">Answered</button>
        </div>

        <div class="questions-section" id="questionsContainer">
            <!-- Questions will be dynamically loaded here -->
        </div>

        <div class="ask-question-btn">
            <button class="btn-primary" onclick="openAskModal()">Ask a Tax Question</button>
        </div>
    </div>

    <!-- Modal for asking new questions -->
    <div id="askModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ask Your Tax Question</h2>
                <button class="close-btn" onclick="closeAskModal()">&times;</button>
            </div>
            <form id="questionForm" onsubmit="submitQuestion(event)">
                <div class="form-group">
                    <label for="questionTitle">Question Title</label>
                    <input type="text" id="questionTitle" required placeholder="Summarize your tax question...">
                </div>
                <div class="form-group">
                    <label for="questionDetails">Question Details</label>
                    <textarea id="questionDetails" required placeholder="Provide more details about your tax question..."></textarea>
                </div>
                <div class="form-group">
                    <label for="questionCategory">Category</label>
                    <input type="text" id="questionCategory" placeholder="e.g., Income Tax, Deductions, Filing Status...">
                </div>
                <button type="submit" class="btn-submit">Submit Question Anonymously</button>
            </form>
        </div>
    </div>

    <script>
        // Sample data for questions
        let questions = [
            {
                id: 1,
                title: "Can I deduct home office expenses?",
                description: "I work from home 4 days a week. What portion of my rent and utilities can I deduct?",
                category: "Deductions",
                answers: 3,
                date: "2 days ago"
            },
            {
                id: 2,
                title: "How do I report cryptocurrency gains?",
                description: "I bought Bitcoin last year and sold some this year. How should I report this on my taxes?",
                category: "Investments",
                answers: 5,
                date: "1 week ago"
            },
            {
                id: 3,
                title: "Am I eligible for the Earned Income Tax Credit?",
                description: "I made $35,000 this year with one dependent. Am I eligible for EITC?",
                category: "Credits",
                answers: 0,
                date: "3 hours ago"
            },
            {
                id: 4,
                title: "What's the deadline for quarterly estimated taxes?",
                description: "I'm self-employed and need to know when to make my quarterly tax payments.",
                category: "Self-Employment",
                answers: 2,
                date: "5 days ago"
            },
            {
                id: 5,
                title: "Can I carry forward capital losses?",
                description: "I had investment losses this year that exceed my gains. Can I use this loss in future years?",
                category: "Investments",
                answers: 4,
                date: "1 week ago"
            }
        ];

        let currentFilter = 'all';

        function displayQuestions(questionsToDisplay) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            if (questionsToDisplay.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: white; font-size: 1.1em;">No questions found.</p>';
                return;
            }

            questionsToDisplay.forEach(question => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <h3>${question.title}</h3>
                    <p>${question.description}</p>
                    <div class="question-meta">
                        <span>${question.category}</span>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <small>${question.date}</small>
                            <div class="answer-count">${question.answers} ${question.answers === 1 ? 'answer' : 'answers'}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterQuestions(filter) {
            currentFilter = filter;
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            let filtered;
            if (filter === 'unanswered') {
                filtered = questions.filter(q => q.answers === 0);
            } else if (filter === 'answered') {
                filtered = questions.filter(q => q.answers > 0);
            } else {
                filtered = questions;
            }

            displayQuestions(filtered);
        }

        function openAskModal() {
            document.getElementById('askModal').classList.add('show');
        }

        function closeAskModal() {
            document.getElementById('askModal').classList.remove('show');
            document.getElementById('questionForm').reset();
        }

        function submitQuestion(event) {
            event.preventDefault();
            const title = document.getElementById('questionTitle').value;
            const details = document.getElementById('questionDetails').value;
            const category = document.getElementById('questionCategory').value || 'General';

            const newQuestion = {
                id: questions.length + 1,
                title: title,
                description: details,
                category: category,
                answers: 0,
                date: "just now"
            };

            questions.unshift(newQuestion);
            closeAskModal();
            filterQuestions(currentFilter);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('askModal');
            if (event.target === modal) {
                closeAskModal();
            }
        }

        // Initial display
        displayQuestions(questions);
    </script>
</body>
</html>
